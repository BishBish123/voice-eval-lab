services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: voice_eval
      POSTGRES_PASSWORD: voice_eval
      POSTGRES_DB: voice_eval
    ports:
      - "5433:5432"
    volumes:
      - backend_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice_eval"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend_pgdata:
