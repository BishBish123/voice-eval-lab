app = "voice-eval-lab-REPLACE-ME"
primary_region = "ord"

[build]

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[[services.tcp_checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
